[build]
  command = "npm run build"
  publish = "dist/public"

# firma. → www.
[[redirects]]
  from = "https://firma.rex-bedachung.de/*"
  to = "https://www.rex-bedachung.de/:splat"
  status = 301
  force = true

# Alte URLs → Neue Leistungsseiten
