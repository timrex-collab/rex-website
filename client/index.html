<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <meta name="keywords" content="Dachdecker, Bochum, Ruhrgebiet, Steildach, Flachdach, Dachdeckerei, Meisterbetrieb" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml">
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/favicon.png" />
    <link rel="preconnect" href="https://s.provenexpert.net">
    <link rel="preload" as="image" href="/images/dachdecker-bochum-steildach-hero.webp" type="image/webp" fetchpriority="high">

    <style>
      /* Critical CSS – above-the-fold: prevents layout shift before main bundle loads */

      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --background: 0 0% 98%;
        --foreground: 0 0% 15%;
        --border: 0 0% 88%;
        --card: 0 0% 100%;
        --primary: 228.08deg 68.22% 41.96%;
        --muted-foreground: 0 0% 40%;
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --radius: .5rem;
      }

      .dark {
        --background: 25 3% 12%;
        --foreground: 0 0% 98%;
        --border: 0 0% 25%;
        --card: 0 0% 18%;
        --primary: 0 68% 42%;
        --muted-foreground: 0 0% 70%;
      }

      html { -webkit-text-size-adjust: 100%; }

      body {
        margin: 0;
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
      }

      #root { min-height: 100vh; }

      /* Navigation – sticky header */
      nav[class*="sticky"] {
        position: sticky;
        top: 0;
        z-index: 50;
        background-color: hsl(var(--background) / 0.9);
        border-bottom: 1px solid hsl(var(--border));
        height: 4rem;
      }

      /* Hero – above-the-fold image container */
      .hero-container {
        position: relative;
        height: 80vh;
        min-height: 500px;
        max-height: 900px;
        width: 100%;
        overflow: hidden;
        background-color: hsl(var(--background));
      }
    </style>

  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" defer src="/src/main.tsx"></script>
    
    <form name="kontakt" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="kontakt" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="telefon" />
      <textarea name="nachricht"></textarea>
    </form>
    
    <div class="pe-richsnippets"></div>
    <script type="text/javascript" src="https://www.provenexpert.com/widget/richsnippet.js?u=2xwolOGZl92okNGpmOGBj5TZjpGAiOKB&v=2" async></script>
  </body>
</html>
